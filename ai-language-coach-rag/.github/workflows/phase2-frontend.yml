name: "CI/CD: Phase 2B - Next.js Frontend"

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'ai-language-coach-frontend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ai-language-coach-frontend/**'

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '22'
  IMAGE_NAME: ai-language-coach-frontend

jobs:
  # --- STAGE 1: NODE SETUP & LINT ---
  lint-and-test:
    name: "Lint & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-language-coach-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ai-language-coach-frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ai-language-coach-frontend
        run: npm run lint || true

      - name: TypeScript Type Check
        working-directory: ai-language-coach-frontend
        run: npx tsc --noEmit

  # --- STAGE 2: SECURITY SCAN ---
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-language-coach-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ai-language-coach-frontend
        run: npm ci

      - name: npm audit
        working-directory: ai-language-coach-frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- STAGE 3: BUILD ---
  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-language-coach-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ai-language-coach-frontend
        run: npm ci

      - name: Build
        working-directory: ai-language-coach-frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: ai-language-coach-frontend/.next
          retention-days: 7

  # --- STAGE 4: BUILD & PUSH IMAGE ---
  build-and-push:
    name: "Build & Push Podman Image"
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: ai-language-coach-frontend/.next

      - name: Set up Podman
        uses: redhat-actions/podman-setup-action@v1
        with:
          podman-version: '5.0'

      - name: Log in to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ github.sha }}
            ${{ github.ref_name }}
          registry: ${{ env.REGISTRY }}/${{ github.actor }}
          dockerfiles: |
            ./ai-language-coach-frontend/Dockerfile
          context: ./
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=AI Language Coach Frontend - Phase 2B
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Print Image URL
        run: |
          echo "Image pushed to: ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest"

