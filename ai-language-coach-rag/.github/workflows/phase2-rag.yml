name: "CI/CD: Phase 2A - Python RAG Engine"

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'ai-universal-rag-engine/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ai-universal-rag-engine/**'

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: ai-universal-rag-engine

jobs:
  # --- STAGE 1: PYTHON SETUP & LINT ---
  lint-and-test:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ai-universal-rag-engine
        run: |
          pip install -e ".[dev]"

      - name: Run Ruff (Linter)
        working-directory: ai-universal-rag-engine
        run: |
          pip install ruff
          ruff check src/

      - name: Run mypy (Type Check)
        working-directory: ai-universal-rag-engine
        run: |
          pip install mypy
          mypy src/

  # --- STAGE 2: SECURITY SCAN ---
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ai-universal-rag-engine
        run: |
          pip install -e .

      - name: Bandit Security Scan
        working-directory: ai-universal-rag-engine
        run: |
          pip install bandit
          bandit -r src/
        continue-on-error: true

      - name: pip-audit Security Scan
        working-directory: ai-universal-rag-engine
        run: |
          pip install pip-audit
          pip-audit -r pyproject.toml
        continue-on-error: true

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- STAGE 3: RUN TESTS ---
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ai-universal-rag-engine
        run: |
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: ai-universal-rag-engine
        run: |
          pytest tests/ -v --tb=short

  # --- STAGE 4: BUILD & PUSH IMAGE ---
  build-and-push:
    name: "Build & Push Podman Image"
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Podman
        uses: redhat-actions/podman-setup-action@v1
        with:
          podman-version: '5.0'

      - name: Log in to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ github.sha }}
            ${{ github.ref_name }}
          registry: ${{ env.REGISTRY }}/${{ github.actor }}
          dockerfiles: |
            ./ai-universal-rag-engine/Dockerfile
          context: ./
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=AI Universal RAG Engine - Phase 2A
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Print Image URL
        run: |
          echo "Image pushed to: ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest"

