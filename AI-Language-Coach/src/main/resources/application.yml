spring:
  application:
    name: ai-language-platform

  datasource:
    url: jdbc:postgresql://${platform.host.db:192.168.0.18}:${platform.host.db-port:5432}/${platform.host.db-name:language_coach}
    username: ${platform.host.db-user:infra_admin}
    password: ${platform.host.db-password:Test@1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${platform.host.valkey:localhost}
      port: ${platform.host.valkey-port:6379}

platform:
  enabled: true
  mode: ${PLATFORM_MODE:coach}
  infrastructure: ${INFRASTRUCTURE:local}

  host:
    valkey: ${VALKEY_HOST:192.168.0.18}
    valkey-port: ${VALKEY_PORT:6379}
    db: ${DB_HOST:192.168.0.18}
    db-port: ${DB_PORT:5432}
    db-name: ${DB_NAME:language_coach}
    db-user: ${DB_USER:infra_admin}
    db-password: ${DB_PASS:Test@1234}

  tenant:
    id: ${TENANT_ID:1}
    name: ${TENANT_NAME:language-coach}
    allowed-ids: ${ALLOWED_TENANT_IDS:1,2}

jwt:
  secret: ${JWT_SECRET:a-very-long-and-secure-random-secret-key-that-is-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

langchain4j:
  google-ai-gemini:
    api-key: ${apikey:123}

server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /api/v1

