# ============================================================================
# AI-Language-Coach: Infrastructure Compose
# 
# Supports TWO modes:
# 1. Local: Run services on same machine (for development)
# 2. Distributed: Run on HP Laptop (192.168.0.18) - connects from Mac
#
# Usage:
#   local:        podman-compose up -d
#   distributed: INFRASTRUCTURE_MODE=distributed podman-compose up -d
#
# Multi-Tenant Setup:
#   Tenant 1 (language-coach): postgres-coach service, DB: language_coach
#   Tenant 2 (app2):          postgres-app2 service, DB: app2_db
# ============================================================================

services:
  # ============================================================================
  # PostgreSQL 16 - Tenant 1: Language Coach
  # ============================================================================
  postgres-coach:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ai-platform}-postgres-coach
    hostname: postgres-coach
    ports:
      - "${POSTGRES_COACH_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME_COACH:-language_coach}
      POSTGRES_USER: ${DB_USER_COACH:-coach_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD_COACH:-coach_pass}
    volumes:
      - postgres_coach_data:/var/lib/postgresql/data
      - ./init-users.sql:/docker-entrypoint-initdb.d/init-users.sql
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_COACH:-coach_user} -d ${DB_NAME_COACH:-language_coach}"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  # ============================================================================
  # PostgreSQL 16 - Tenant 2: App2 (New Application)
  # ============================================================================
  postgres-app2:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ai-platform}-postgres-app2
    hostname: postgres-app2
    ports:
      - "${POSTGRES_APP2_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME_APP2:-app2_db}
      POSTGRES_USER: ${DB_USER_APP2:-app2_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD_APP2:-app2_pass}
    volumes:
      - postgres_app2_data:/var/lib/postgresql/data
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_APP2:-app2_user} -d ${DB_NAME_APP2:-app2_db}"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  # ============================================================================
  # PostgreSQL 16 - Authentik Database (separate from application DBs)
  # ============================================================================
  postgres-authentik:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ai-platform}-postgres-authentik
    hostname: postgres-authentik
    ports:
      - "${POSTGRES_AUTHENTIK_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME_AUTHENTIK:-authentik}
      POSTGRES_USER: ${DB_USER_AUTHENTIK:-authentik}
      POSTGRES_PASSWORD: ${DB_PASSWORD_AUTHENTIK:-authentik_pass}
    volumes:
      - postgres_authentik_data:/var/lib/postgresql/data
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_AUTHENTIK:-authentik}"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  # ============================================================================
  # Valkey 7.2+ - Cache/Session Store (Redis-compatible)
  # Optimized for ARM64 (Oracle Ampere) and x86_64
  # ============================================================================
  valkey:
    image: valkey/valkey:7.2
    container_name: ${COMPOSE_PROJECT_NAME:-ai-platform}-valkey
    hostname: valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    command: >
      valkey-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    volumes:
      - valkey_data:/data
    networks:
      - platform-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================================
  # Qdrant - Vector Database for RAG (Future)
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${COMPOSE_PROJECT_NAME:-ai-platform}-qdrant
    hostname: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - platform-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  platform-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.0.0/24

volumes:
  postgres_coach_data:
  postgres_app2_data:
  postgres_authentik_data:
  valkey_data:
  qdrant_data: