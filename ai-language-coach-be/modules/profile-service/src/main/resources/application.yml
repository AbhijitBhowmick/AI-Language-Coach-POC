spring:
  application:
    name: profile-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:language_coach}
    username: ${DB_USER:infra_admin}
    password: ${DB_PASS:Test@1234}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 600000
      idle-timeout: 300000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

server:
  port: ${APP_PORT:8082}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false
  paths-to-match: /profile/**
  cache:
    disabled: true