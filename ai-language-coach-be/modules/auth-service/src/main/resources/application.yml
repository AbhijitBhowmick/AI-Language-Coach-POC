server:
  port: ${APP_PORT:8081}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:language_coach}
    username: ${DB_USER:infra_admin}
    password: ${DB_PASS:Test@1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 600000
      idle-timeout: 300000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

jwt:
  secret: ${JWT_SECRET:a-very-long-and-secure-random-secret-key-that-is-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  default-tenant-id: ${DEFAULT_TENANT:SYSTEM}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false
  paths-to-match: /auth/**
  cache:
    disabled: true