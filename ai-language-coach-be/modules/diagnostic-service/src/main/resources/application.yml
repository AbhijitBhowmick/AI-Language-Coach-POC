spring:
  application:
    name: diagnostic-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:language_coach}
    username: ${DB_USER:infra_admin}
    password: ${DB_PASS:Test@1234}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 600000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  cache:
    type: none

  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}

server:
  port: ${APP_PORT:8083}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

security:
  permit-all-paths: /api/v1/diagnostic/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html,/actuator/**

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false
  paths-to-match: /diagnostic/**,/api/v1/diagnostic/**
  cache:
    disabled: true

# Game Configuration
game:
  session:
    ttl-minutes: 30
  adaptive:
    enabled: true
    irt-enabled: true
  gamification:
    streak-bonus-threshold: 3
    time-bonus-threshold-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.platform.diagnostic: DEBUG
    com.platform.diagnostic.game: INFO